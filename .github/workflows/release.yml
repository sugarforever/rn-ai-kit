name: Release packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test @rn-ai-kit/auth
        working-directory: packages/auth
        run: npx jest

      - name: Test @rn-ai-kit/chatgpt-provider
        working-directory: packages/chatgpt-provider
        run: npx jest

      - name: Test @rn-ai-kit/sessions
        working-directory: packages/sessions
        run: npx jest

      - name: Build all packages
        run: npm run build --workspaces --if-present

      - name: Publish @rn-ai-kit/auth (if new version)
        working-directory: packages/auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "$NAME@$VERSION already published — skipping."
          else
            echo "Publishing $NAME@$VERSION…"
            npm publish --provenance
          fi

      - name: Publish @rn-ai-kit/chatgpt-provider (if new version)
        working-directory: packages/chatgpt-provider
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "$NAME@$VERSION already published — skipping."
          else
            echo "Publishing $NAME@$VERSION…"
            npm publish --provenance
          fi

      - name: Publish @rn-ai-kit/sessions (if new version)
        working-directory: packages/sessions
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "$NAME@$VERSION already published — skipping."
          else
            echo "Publishing $NAME@$VERSION…"
            npm publish --provenance
          fi
