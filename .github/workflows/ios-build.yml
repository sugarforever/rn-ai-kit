name: Orla iOS build

on:
  push:
    tags:
      - 'orla-v*'
  workflow_dispatch:
    inputs:
      lane:
        description: 'Which lane to run'
        required: true
        default: 'testflight'
        type: choice
        options:
          - testflight
          - archive-only

jobs:
  ios:
    name: Build + upload to TestFlight
    runs-on: macos-14
    timeout-minutes: 60
    env:
      APP_DIR: apps/orla
      BUNDLE_ID: app.heyorla
      SCHEME: Orla
      CONFIGURATION: Release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS deps
        run: npm ci

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Ruby (for CocoaPods)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Expo prebuild (iOS)
        working-directory: ${{ env.APP_DIR }}
        run: npx expo prebuild --platform ios --no-install --clean

      - name: Install CocoaPods
        working-directory: ${{ env.APP_DIR }}/ios
        run: pod install --repo-update

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_P12_CERT }}
          p12-password: ${{ secrets.APPLE_P12_PASSWORD }}

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILES_DIR/orla.mobileprovision"
          # Verify
          security cms -D -i "$PROFILES_DIR/orla.mobileprovision" > /tmp/profile.plist
          /usr/libexec/PlistBuddy -c "Print :Name" /tmp/profile.plist
          /usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist

      - name: Archive
        working-directory: ${{ env.APP_DIR }}/ios
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.APPLE_PROVISIONING_PROFILE_NAME }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace "${SCHEME}.xcworkspace" \
            -scheme "${SCHEME}" \
            -configuration "${CONFIGURATION}" \
            -archivePath "$RUNNER_TEMP/${SCHEME}.xcarchive" \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates=NO \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            | xcbeautify

      - name: Export IPA
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.APPLE_PROVISIONING_PROFILE_NAME }}
        run: |
          cat > "$RUNNER_TEMP/export-options.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/${SCHEME}.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/export-options.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            | xcbeautify

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: orla-ipa
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 14

      - name: Upload to TestFlight
        if: github.event_name == 'push' || github.event.inputs.lane == 'testflight'
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ${{ runner.temp }}/export/${{ env.SCHEME }}.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
